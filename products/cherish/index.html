<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Cherish - Communication Coach</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#FFF6F1;color:#2D2A28;min-height:100vh;display:flex;flex-direction:column}

.topbar{background:#FFFBF9;border-bottom:1px solid #F0E8E2;padding:10px 16px;display:flex;align-items:center;gap:8px}
.topbar h1{font-size:15px;font-weight:700;flex:1}
.ver{font-size:10px;color:#9B9590;background:#F3EFEA;padding:2px 8px;border-radius:99px}

.main{flex:1;overflow-y:auto;padding:14px 14px 0;max-width:540px;width:100%;margin:0 auto}
.main > * {margin-bottom:10px}

/* ── User bubble (right side) ── */
.bub{text-align:right}
.bub span{display:inline-block;background:#2D2A28;color:#fff;border-radius:14px 14px 5px 14px;padding:10px 14px;font-size:14px;line-height:1.5;max-width:85%;text-align:left;white-space:pre-wrap}

/* ── Cherish message bubble (left side) — her analysis, NOT a draft ── */
.cherish-msg{display:flex;gap:8px;align-items:flex-start}
.cherish-msg .avatar{width:28px;height:28px;border-radius:50%;background:#E8845C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700}
.cherish-msg .body{background:#FFF8F4;border:1px solid #F5DDD0;border-radius:12px 12px 12px 4px;padding:10px 13px;font-size:13px;line-height:1.55;color:#4A332B;max-width:88%}
.cherish-msg .body .who{font-size:10px;font-weight:700;color:#C9653B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}

/* ── Cards ── */
.card{border-radius:14px;padding:12px}

/* Welcome */
.card.welcome{background:#FFFBF9;border:1px solid #F0E8E2}
.card.welcome .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.card.welcome .chip{font-size:12px;padding:7px 12px;border-radius:10px;border:1px solid #F0D7C9;background:#fff;color:#2D2A28;cursor:pointer;font-family:inherit}
.card.welcome .chip:active{border-color:#E8845C;background:#FFF8F4}

/* Options — her choices, clearly separate from Cherish's analysis */
.card.options{background:#fff;border:2px solid #F0E8E2}
.card.options .section-title{font-size:11px;font-weight:700;color:#9B9590;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.card.options .section-title::before{content:'';display:inline-block;width:14px;height:2px;background:#E2C8BA;border-radius:1px}
.card.options .opt{width:100%;text-align:left;padding:12px;border-radius:10px;border:1.5px solid #F0D7C9;background:#FFFBF9;color:#2D2A28;font-family:inherit;font-size:13px;line-height:1.45;cursor:pointer;display:flex;gap:8px;align-items:center;margin-bottom:6px}
.card.options .opt:last-child{margin-bottom:0}
.card.options .opt.sel{border-color:#E8845C;background:#FFF8F4}
.card.options .opt:disabled{opacity:.5}
.card.options .ck{width:20px;height:20px;border-radius:6px;border:2px solid #E2C8BA;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.card.options .opt.sel .ck{border-color:#E8845C;background:#E8845C;color:#fff}
.card.options .act{display:flex;gap:8px;align-items:center;margin-top:8px}
.card.options .act button{flex:1;border:none;background:#E8845C;color:#fff;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.card.options .act button:disabled{background:#E2C8BA;cursor:default}
.card.options .act .cnt{font-size:11px;color:#9B6B55}

/* Compose — the draft she'll send. Clearly different from Cherish's messages. */
.card.compose{background:#fff;border:2px dashed #5BA88E;border-radius:14px}
.card.compose .section-title{font-size:11px;font-weight:700;color:#3D8C72;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.card.compose .section-title::before{content:'';display:inline-block;width:14px;height:2px;background:#8FD4B8;border-radius:1px}
.card.compose textarea{width:100%;border:1.5px solid #D0E8DC;border-radius:10px;padding:12px;font-size:14px;font-family:inherit;line-height:1.7;resize:none;min-height:90px;background:#FAFFFC;color:#2D2A28}
.card.compose textarea:focus{outline:none;border-color:#5BA88E}
.card.compose .ft{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px}
.card.compose .ft .tip{font-size:11px;color:#8C837B;flex:1}
.card.compose .ft button{border:none;background:#5BA88E;color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.card.compose .ft button:active{transform:scale(.96)}

/* Archived — past cards dimmed */
.card.archived{opacity:.82}
.card.archived button{cursor:default}
.card.archived textarea{background:#FFFBF9;color:#5F5954}

/* Next-step hint — shown after compose card */
.next-step{font-size:11px;color:#8C837B;text-align:center;padding:4px 0 8px}

.input-bar{background:#FFFBF9;border-top:1px solid #F0E8E2;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px;max-width:540px;margin:0 auto;width:100%}
.input-bar textarea{flex:1;border:1.5px solid #F0E8E2;border-radius:12px;padding:10px 12px;font-size:14px;font-family:inherit;resize:none;min-height:40px;max-height:90px;line-height:1.5;background:#fff;color:#2D2A28}
.input-bar textarea:focus{outline:none;border-color:#E8845C}
.input-bar textarea::placeholder{color:#B9B0A8}
.input-bar .go{width:40px;height:40px;border-radius:12px;background:#E8845C;color:#fff;border:none;font-size:16px;cursor:pointer;flex-shrink:0;font-weight:800}
.input-bar .go:disabled{background:#CCC}

.reset-btn{text-align:center;font-size:11px;color:#9B9590;padding:4px 0 14px;cursor:pointer;text-decoration:underline}

@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.bub,.cherish-msg,.card{animation:up .2s ease-out}
</style>
</head>
<body>

<div class="topbar"><h1><span style="color:#E8845C">♡</span> Cherish</h1><span class="ver">Prototype</span></div>

<div class="main" id="main"></div>

<div class="input-bar">
  <textarea id="input" rows="1" placeholder="Describe what happened..."></textarea>
  <button class="go" id="go">↑</button>
</div>

<script src="./cherish_core.js?v=8"></script>
<script>
const main = document.getElementById('main');
const input = document.getElementById('input');
const go = document.getElementById('go');
const STORAGE_KEY = 'cherish_en_v6_history';
let messages = [], lastStage = '';

// ── Init ──
(async function init(){
  const saved = loadConversation();
  if(saved && saved.messages && saved.messages.length){
    messages = saved.messages;
    lastStage = saved.lastStage || '';
    await restoreConversation();
  } else {
    await startFresh();
  }
})();

go.addEventListener('click', () => send());
input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} });

// ── Send ──
async function send(forcedText, displayText){
  if(go.disabled) return;
  const raw = forcedText || input.value;
  const text = raw.trim();
  if(!text) return;

  go.disabled = true;
  input.value = '';

  const visible = displayText || text;
  archiveActiveCards();

  // Show user bubble — but NOT for system messages
  if (!visible.startsWith('Selected')){
    const bub = document.createElement('div');
    bub.className = 'bub';
    bub.innerHTML = '<span>'+esc(visible)+'</span>';
    main.appendChild(bub);
  }

  // 2. Push user message
  messages.push({role:'user', content:text});

  // 3. Determine stage
  const reqStage = isSelection(text) ? 'compose' : 'options';

  // 4. Call API
  let result;
  try {
    if(window.CherishCore && window.CherishCore.chatPipeline) {
      result = await CherishCore.chatPipeline(messages, reqStage);
    } else {
      const body = JSON.stringify({messages, stage:reqStage});
      const res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body});
      const data = await res.json();
      if(data && !data.error) result = data;
    }
  } catch(e){
    console.error('Chat error:', e);
    result = { action:'showWelcome', stage:'welcome', text:'Something went wrong. Please refresh and try again.' };
  }

  // 5. Save
  messages.push({role:'ai', content:JSON.stringify(result)});
  lastStage = result.stage || '';
  saveConversation();

  // 6. Replace interactive area (everything after the last bubble)
  clearActiveOnly();
  showInteractive(result);
  showResetLink();

  go.disabled = false;
  input.focus();
  main.scrollTop = main.scrollHeight;
}

// ── History ──
async function startFresh(){
  messages = [];
  lastStage = '';
  main.innerHTML = '';
  clearSavedConversation();
  showWelcomeCard(await CherishCore.chatPipeline([], ''));
}

function saveConversation(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({messages, lastStage, savedAt: Date.now()}));
  } catch(e){}
}

function loadConversation(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
  catch(e){ return null; }
}

function clearSavedConversation(){
  try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
}

async function restoreConversation(){
  main.innerHTML = '';
  const parsed = messages.map((m, index) => ({...m, index, result: m.role === 'ai' ? parseAIResult(m.content) : null}));
  const lastAI = [...parsed].reverse().find(m => m.role === 'ai' && m.result);

  parsed.forEach(item => {
    if(item.role === 'user'){
      if(!String(item.content || '').startsWith('Selected') && !isSelection(item.content)){
        renderUserBubble(item.content);
      }
      return;
    }
    if(item.role === 'ai' && item.result){
      showInteractive(item.result);
      if(!lastAI || item.index !== lastAI.index) archiveActiveCards();
    }
  });

  if(!lastAI) showWelcomeCard(await CherishCore.chatPipeline([], ''));
  showResetLink();
  main.scrollTop = main.scrollHeight;
}

function parseAIResult(content){
  try {
    const parsed = JSON.parse(content || '{}');
    return parsed && typeof parsed === 'object' ? parsed : null;
  } catch(e){ return null; }
}

function renderUserBubble(text){
  const bub = document.createElement('div');
  bub.className = 'bub';
  bub.innerHTML = '<span>'+esc(text)+'</span>';
  main.appendChild(bub);
}

function showCherishMsg(text){
  const el = document.createElement('div');
  el.className = 'cherish-msg';
  el.innerHTML =
    '<div class="avatar">♡</div>' +
    '<div class="body"><div class="who">Cherish says</div>' + esc(text) + '</div>';
  main.appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function archiveActiveCards(){
  main.querySelectorAll('.card:not(.welcome):not(.archived)').forEach(card => {
    card.classList.add('archived');
    card.querySelectorAll('button').forEach(btn => {
      btn.disabled = true;
      btn.removeAttribute('onclick');
    });
    card.querySelectorAll('textarea').forEach(ta => {
      ta.readOnly = true;
      if(ta.id === 'composeBox') ta.removeAttribute('id');
    });
  });
}

// ── Render: keep history, only remove transient active UI ──
function clearActiveOnly(){
  main.querySelectorAll('.card.welcome,.reset-btn').forEach(el => el.remove());
}

function showInteractive(data){
  if(data.stage === 'options') showOptionsCard(data);
  else if(data.stage === 'compose') showComposeCard(data);
  else showWelcomeCard(data);
}

function showWelcomeCard(data){
  const el = document.createElement('div');
  el.className = 'card welcome';
  el.innerHTML = esc(data.text||'') +
    '<div class="chips">' +
    (data.quickScenarios||[]).map(s =>
      '<button class="chip" data-ph="'+escAttr(s.placeholder)+'">'+s.icon+' '+esc(s.label)+'</button>'
    ).join('') +
    '</div>';
  main.appendChild(el);

  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', function(){
      input.value = this.dataset.ph;
      input.focus();
    });
  });
}

function showOptionsCard(data){
  // Render Cherish's hint as a separate message bubble first
  if (data.hint) {
    showCherishMsg(data.hint);
  }

  const el = document.createElement('div');
  el.className = 'card options';

  let html = '<div class="section-title">Choose the direction for your message</div>';
  (data.choices||[]).forEach(c => {
    html += '<button class="opt" data-v="'+escAttr(c.value)+'"><span class="ck"></span>'+esc(c.text)+'</button>';
  });
  html += '<div class="act"><button class="gen" disabled>Generate draft</button><span class="cnt">Nothing selected</span></div>';
  el.innerHTML = html;

  const cards = el.querySelectorAll('.opt');
  const genBtn = el.querySelector('.gen');
  const cntEl = el.querySelector('.cnt');

  cards.forEach(c => {
    c.addEventListener('click', function(){
      this.classList.toggle('sel');
      const n = el.querySelectorAll('.opt.sel').length;
      genBtn.disabled = n===0;
      cntEl.textContent = n ? `${n} selected` : 'Nothing selected';
    });
  });

  genBtn.addEventListener('click', function(){
    const sel = [...el.querySelectorAll('.opt.sel')];
    if(!sel.length) return;
    cards.forEach(c => { c.disabled = true; });
    genBtn.disabled = true;
    send(sel.map(c => c.dataset.v).join(';'), 'Selected '+sel.length+' direction'+(sel.length > 1 ? 's' : ''));
  });

  main.appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function showComposeCard(data){
  // Render the draft card — this is what she sends to him, NOT Cherish talking
  const el = document.createElement('div');
  el.className = 'card compose';
  el.innerHTML =
    '<div class="section-title">Message to send (editable)</div>' +
    '<textarea id="composeBox">'+esc(data.draft||'')+'</textarea>' +
    '<div class="ft">' +
      '<span class="tip">'+(data.note ? esc(data.note) : '')+'</span>' +
      '<button onclick="cpDraft()">Copy</button>' +
    '</div>';
  main.appendChild(el);

  const ta = el.querySelector('#composeBox');
  ta.addEventListener('input', () => {
    ta.style.height='auto';
    ta.style.height=Math.min(ta.scrollHeight, 200)+'px';
  });
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight, 200)+'px';

  // Next-step hint
  const hint = document.createElement('div');
  hint.className = 'next-step';
  hint.textContent = 'After you send it, paste their reply here and Cherish will help with the next step.';
  main.appendChild(hint);

  el.scrollIntoView({behavior:'smooth'});
}

// ── Copy ──
window.cpDraft = function(){
  const ta = document.getElementById('composeBox');
  if(!ta) return;
  if(navigator.clipboard) navigator.clipboard.writeText(ta.value).catch(()=>{});
  else {
    const a = document.createElement('textarea');
    a.value = ta.value; a.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(a); a.select(); document.execCommand('copy'); a.remove();
  }
  const btn = document.querySelector('.card.compose .ft button');
  if(btn){ btn.textContent = 'Copied'; setTimeout(()=>{btn.textContent='Copy'},2000); }
};

// ── Reset ──
function showResetLink(){
  if(document.getElementById('reset-link')) return;
  const d = document.createElement('div');
  d.className = 'reset-btn'; d.id = 'reset-link';
  d.textContent = '↺ Start over';
  d.addEventListener('click', startFresh);
  main.appendChild(d);
}

function isSelection(text){
  const t = (text||'').trim();
  return /^Selected/.test(t) || /^(feeling|need|boundary|action)([;](feeling|need|boundary|action))*$/.test(t);
}

function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function escAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
