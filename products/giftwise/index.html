<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GiftWise · AI gift picker (UK)</title>
<style>
:root {
  --bg: #f5f5f5; --card: #fff; --text: #1a1a2e; --sub: #6b7280;
  --accent: #f97316; --accent2: #fb923c; --green: #10b981; --red: #ef4444;
  --border: #e5e7eb; --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e; display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}
.phone {
  width: 100%; max-width: 420px; height: 100vh; max-height: 820px;
  background: var(--bg); display: flex; flex-direction: column; overflow: hidden;
}

.nav {
  background: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.nav .logo { font-size: 18px; font-weight: 800; flex: 1; }
.nav .logo em { color: var(--accent); font-style: normal; }
.nav-btn {
  border: 1px solid var(--border); background: #fff; color: var(--text);
  border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all .15s;
  display: flex; align-items: center; gap: 4px;
}
.nav-btn:active { transform: scale(.96); }
.nav-btn .count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; border-radius: 999px;
  background: var(--accent); color: #fff; font-size: 11px; font-weight: 800;
}

.view { flex: 1; display: none; flex-direction: column; overflow-y: auto; }
.view.active { display: flex; }
.view::-webkit-scrollbar { width: 0; }

/* ── Stepper ── */
.stepper { padding: 20px 16px; }
.step-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 24px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; transition: all .3s; }
.step-dot.done { background: var(--accent2); }
.step-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
.step-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.step-sub { font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 20px; }

.opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
.opt-card {
  background: #fff; border-radius: var(--radius); padding: 18px 14px;
  text-align: center; cursor: pointer; transition: all .18s;
  border: 2px solid transparent; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.opt-card:active { transform: scale(.96); }
.opt-card.selected { border-color: var(--accent); background: #fff7ed; }
.opt-card .oi { font-size: 32px; margin-bottom: 6px; }
.opt-card .ol { font-size: 14px; font-weight: 600; }
.opt-card .od { font-size: 11px; color: var(--sub); margin-top: 2px; }

.budget-list { display: flex; flex-direction: column; gap: 8px; }
.budget-row {
  background: #fff; border-radius: var(--radius); padding: 16px;
  cursor: pointer; transition: all .18s; border: 2px solid transparent;
  display: flex; align-items: center; gap: 12px;
}
.budget-row:active { transform: scale(.98); }
.budget-row.selected { border-color: var(--accent); background: #fff7ed; }
.budget-row .bi { font-size: 24px; }
.budget-row .bl { font-size: 15px; font-weight: 600; flex: 1; }
.budget-row .bd { font-size: 11px; color: var(--sub); }

.back-link { text-align: center; margin-top: 12px; font-size: 13px; color: var(--sub); cursor: pointer; }

/* ── Results ── */
.results { padding: 20px 16px; }
.result-header { text-align: center; padding: 8px 0 20px; }
.result-header .rh-icon { font-size: 44px; margin-bottom: 6px; }
.result-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.result-header p { font-size: 13px; color: var(--sub); }

.gift-card {
  background: #fff; border-radius: var(--radius); padding: 18px;
  margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  border-left: 4px solid var(--accent); animation: fadeUp .3s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } }
.gc-rank {
  font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 6px;
}
.gc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.gc-title { font-size: 16px; font-weight: 700; flex: 1; display: flex; align-items: center; gap: 8px; }
.gc-title .gc-icon { font-size: 22px; }
.gc-price {
  font-size: 13px; font-weight: 800; color: var(--accent); white-space: nowrap;
  background: #fff7ed; padding: 4px 12px; border-radius: 10px;
}
.gc-why { font-size: 13px; line-height: 1.6; color: #555; margin-bottom: 10px; }
.gc-brands-label { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
.gc-brands { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.gc-brand {
  font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  background: #f3f4f6; color: #555; border: none;
  transition: all .15s; font-family: inherit;
}
.gc-brand:active { background: var(--accent); color: #fff; }
.gc-brand.copied { background: var(--green); color: #fff; }

.gc-warning {
  margin-top: 8px; padding: 8px 12px; background: #fef2f2; border-radius: 8px;
  font-size: 12px; color: #991b1b;
}
.gc-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f3f4f6; }
.gc-fav {
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border);
  background: #fff; color: var(--sub); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.gc-fav:active { transform: scale(.96); }
.gc-fav.saved { border-color: var(--accent); color: var(--accent); background: #fff7ed; }

.budget-tabs {
  display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto;
  padding: 0 16px;
}
.budget-tabs::-webkit-scrollbar { width: 0; }
.budget-tab {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: #fff; color: var(--sub); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; white-space: nowrap; transition: all .15s;
}
.budget-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.budget-tab:active { transform: scale(.96); }
.action-row { display: flex; gap: 10px; margin: 12px 0 8px; justify-content: center; }
.btn {
  flex: 1; padding: 14px; border-radius: 28px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.btn:active { transform: scale(.96); }
.btn.primary { background: var(--accent); color: #fff; }
.btn.secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }

/* ── Poll ── */
.poll-card { background: #fff; border-radius: var(--radius); padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.poll-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; cursor: pointer; transition: background .15s; border-radius: 8px;
}
.poll-row:active { background: #fef3c7; }
.poll-left { display: flex; align-items: center; gap: 8px; flex: 1; font-size: 13px; }
.poll-title { font-weight: 600; }
.poll-price { font-size: 11px; color: var(--accent); }
.poll-right { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--sub); }
.poll-pct { font-weight: 700; color: var(--text); min-width: 32px; text-align: right; }
.poll-bar { height: 4px; background: #f3f4f6; border-radius: 2px; margin-bottom: 4px; }
.poll-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }

/* ── Favorites Drawer ── */
.drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 29; display: none; }
.drawer-backdrop.open { display: block; }
.drawer {
  position: fixed; top: 0; right: 0; width: min(360px, 88vw); height: 100vh;
  background: #fff; z-index: 30; transform: translateX(100%);
  transition: transform .25s ease; display: flex; flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,.1);
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  padding: 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.drawer-head h3 { font-size: 16px; font-weight: 700; }
.drawer-close {
  border: 1px solid var(--border); background: #fff; color: var(--text);
  border-radius: 999px; width: 34px; height: 34px; font-size: 18px; cursor: pointer;
}
.drawer-list { flex: 1; overflow-y: auto; padding: 12px; }
.drawer-empty { text-align: center; padding: 60px 20px; color: var(--sub); }
.drawer-empty .de-icon { font-size: 48px; margin-bottom: 12px; }
.fav-item {
  background: #fafafa; border: 1px solid var(--border); border-radius: 12px;
  padding: 14px; margin-bottom: 8px;
}
.fav-item .fav-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.fav-item .fav-name { font-size: 14px; font-weight: 700; flex: 1; display: flex; align-items: center; gap: 6px; }
.fav-item .fav-price { font-size: 12px; font-weight: 800; color: var(--accent); }
.fav-item .fav-why { font-size: 12px; color: var(--sub); line-height: 1.5; margin-bottom: 6px; }
.fav-item .fav-brands { font-size: 11px; color: #999; }
.fav-item .fav-meta { font-size: 10px; color: #bbb; margin-top: 6px; display: flex; gap: 12px; }
.fav-remove { margin-top: 4px; font-size: 11px; color: var(--red); cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }

.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(26,26,46,0.9); color: #fff; padding: 12px 28px; border-radius: 12px;
  font-size: 14px; font-weight: 600; z-index: 100; animation: toastIn .3s;
  pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%,-50%) translateY(8px); } }
</style>
</head>

// Resolve string references at load time (only dot-paths like 'girlfriend.birthday.low', not data strings)
(function resolveRefs(obj){
  for(var k in obj){
    var v=obj[k];
    if(typeof v==='string'&&v.indexOf('.')>0){
      var parts=v.split('.'),ref=GIFT_POOL;
      for(var p=0;p<parts.length;p++)ref=ref[parts[p]];
      obj[k]=ref;
    }else if(v&&typeof v==='object'&&!Array.isArray(v)){
      resolveRefs(v);
    }
  }
})(GIFT_POOL);

var BUDGET_TIERS = [
  {id:"low",label:"Under £25",desc:"A little something",range:[0,25]},
  {id:"midLow",label:"£25 – 50",desc:"Thoughtful",range:[18,50]},
  {id:"midHigh",label:"£50 – 100",desc:"Something special",range:[40,100]},
  {id:"high",label:"£100+",desc:"A big gesture",range:[90,99999]},
];

function parsePrice(str){
  var m=str.match(/¥?(\d+)\s*[-–—~至到]?\s*¥?(\d+)/);
  if(m)return{min:parseInt(m[1]),max:parseInt(m[2])};
  m=str.match(/¥?(\d+)/);
  if(m)return{min:parseInt(m[1]),max:parseInt(m[1])};
  return{min:0,max:9999};
}

function budgetMatch(giftPrice,budgetId){
  var pp=parsePrice(giftPrice);
  for(var i=0;i<BUDGET_TIERS.length;i++){
    if(BUDGET_TIERS[i].id===budgetId){
      var r=BUDGET_TIERS[i].range;
      // Gift must have actual price overlap with budget range
      // e.g. ¥50-150 does NOT overlap ¥500-1000
      return pp.min<=r[1]&&pp.max>=r[0];
    }
  }
  return true;
}

function isNearby(occ){
  if(!occ.seasonal)return true;
  var now=new Date(),thisMonth=now.getMonth()+1;
  var mons=occ.months;if(!mons)return true;
  for(var i=0;i<mons.length;i++){
    var m=mons[i];
    var dist=m-thisMonth;
    if(dist<-6)dist+=12;
    if(dist>6)dist-=12;
    if(Math.abs(dist)<=2)return true;
  }
  return false;
}

function resolvePool(rel,occ,bud){
  var r=GIFT_POOL[rel];
  if(!r)return null;
  var o=r[occ];
  if(!o){o=r['birthday'];if(!o)return null;}
  // Map 4-tier budget to 3-tier pool keys. No cross-tier fallback.
  var key=bud;
  if(bud==='midLow'||bud==='midHigh')key='mid';
  var pool=o[key];
  return (pool&&Array.isArray(pool))?pool:null;
}

function getRecommendations(){
  // Only merge strictly adjacent budget tiers
  var tiers=[state.budget];
  if(state.budget==='midLow')tiers=['midLow','low'];
  if(state.budget==='midHigh')tiers=['midHigh','midLow'];
  if(state.budget==='low')tiers=['low'];
  if(state.budget==='high')tiers=['high'];

  var pool=[],seen={};
  for(var ti=0;ti<tiers.length;ti++){
    var p=resolvePool(state.relation,state.occasion,tiers[ti]);
    if(!p||!Array.isArray(p))continue;
    for(var pi=0;pi<p.length;pi++){
      var g=p[pi];
      if(!budgetMatch(g.p,state.budget))continue;
      if(state.interest&&state.interest!=='dunno'){
        var icons=INTEREST_ICONS[state.interest]||[];
        if(icons.length&&icons.indexOf(g.i)===-1)continue;
      }
      var key=g.t+'|'+g.p;
      if(!seen[key]){seen[key]=true;pool.push(g);}
    }
  }
  if(pool.length<3){
    var fb=resolvePool('any','birthday',state.budget);
    if(fb)pool=pool.concat(fb);
  }
  return pool;
}

  },
  {
    title:"What are they into?",sub:"Helps us narrow it down",
    render:function(){
      var h='<div class="opt-grid">';
      for(var i=0;i<ALL_INTERESTS.length;i++){
        var o=ALL_INTERESTS[i];
        h+='<div class="opt-card'+(state.interest===o.i?' selected':'')+'" onclick="next(\'interest\',\''+o.i+'\')"><div class="oi">'+o.icon+'</div><div class="ol">'+o.l+'</div></div>';
      }
      return h+'</div>';
    }
  },
];

function renderStep(){
  var s=STEPS[state.step];
  var c=document.getElementById('stepperContent');
  var dots='';
  for(var i=0;i<4;i++){
    var cls='step-dot';
    if(i<state.step)cls+=' done';else if(i===state.step)cls+=' active';
    dots+='<div class="'+cls+'"></div>';
  }
  c.innerHTML='<div class="step-dots">'+dots+'</div><div class="step-title">'+s.title+'</div><div class="step-sub">'+s.sub+'</div>'+s.render()+(state.step>0?'<div class="back-link" onclick="prev()">← Back</div>':'');
  document.getElementById('stepperView').scrollTop=0;
}

function next(key,val){
  state[key]=val;
  if(key==='relation'){state.occasion=null;}
  if(key==='occasion'){}
  if(key==='budget'){}
  state.step++;
  if(state.step>=4)showResults();
  else renderStep();
}

function prev(){if(state.step>0){state.step--;renderStep();}}

// ──────────────────────────────────
// Results
// ──────────────────────────────────
function showResults(){
  showView('resultsView');
  renderResults();
}

function renderResults(){
  var pool=getRecommendations();
  var gifts=pool;

  var relLabel='';for(var i=0;i<PPL_LABELS.length;i++)if(PPL_LABELS[i].i===state.relation)relLabel=PPL_LABELS[i].l;
  var occLabel='';for(var j=0;j<ALL_OCCASIONS.length;j++)if(ALL_OCCASIONS[j].id===state.occasion)occLabel=ALL_OCCASIONS[j].label;
  if(!relLabel)relLabel='them';

  var h='<div class="result-header"><div class="rh-icon">🎁</div><h2>'+relLabel+' · '+occLabel+'</h2><p><a href="javascript:resetAll()" style="color:var(--accent);font-size:13px;font-weight:600;text-decoration:none">← Start over</a></p></div>';

  h+='<div class="budget-tabs">';
  for(var bi=0;bi<BUDGET_TIERS.length;bi++){
    var bt=BUDGET_TIERS[bi];
    h+='<button class="budget-tab'+(state.budget===bt.id?' active':'')+'" onclick="switchBudget(\''+bt.id+'\')">'+bt.label+'</button>';
  }
  h+='</div>';

  for(var m=0;m<gifts.length;m++){
    var g=gifts[m];
    var rank=m+1;
    var brandsHtml='';
    var brandList=g.b.split('/');
    for(var b=0;b<brandList.length;b++){
      var bn=brandList[b].trim();
      brandsHtml+='<button class="gc-brand" onclick="copyBrand(event,\''+bn.replace(/'/g,"\\'")+'\')">'+bn+'</button>';
    }

    var saved=false;
    for(var s=0;s<savedGifts.length;s++){
      if(savedGifts[s].item.t===g.t){saved=true;break;}
    }

    h+='<div class="gift-card" style="animation-delay:'+(m*0.04)+'s">'+
      '<div class="gc-rank">Pick '+rank+'</div>'+
      '<div class="gc-top"><div class="gc-title"><span class="gc-icon">'+g.i+'</span>'+g.t+'</div><div class="gc-price">'+g.p+'</div></div>'+
      '<div class="gc-why">'+g.w+'</div>'+
      '<div class="gc-brands-label">🏷️ Brands · tap to copy</div>'+
      '<div class="gc-brands">'+brandsHtml+'</div>'+
      (g.c?'<div class="gc-warning">⚠️ '+g.c+'</div>':'')+
      '<div class="gc-actions"><button class="gc-fav'+(saved?' saved':'')+'" onclick="toggleFav(this,'+m+')">★ '+(saved?'Saved':'Save')+'</button></div></div>';
  }

  h+='<div class="action-row">';
  h+='<button class="btn secondary" style="background:#10b981;color:#fff;border:none" onclick="sharePoll()">💬 Ask a friend to pick</button></div>';

  document.getElementById('resultsContent').innerHTML=h;
  document.getElementById('resultsView').scrollTop=0;
}

function switchBudget(id){
  state.budget=id;
  showView('resultsView');renderResults();
}


var pollVotes=[];

	var sharePoll = function(){
	  var data = { rel: state.relation, occ: state.occasion, bud: state.budget, int: state.interest||'dunno' };
	  var url = location.href.split('#')[0] + '#share=' + encodeURIComponent(JSON.stringify(data));
	  if (navigator.clipboard) {
	    navigator.clipboard.writeText(url).then(function () { showToast('Link copied — send it to a friend'); });
	  } else {
	    var ta = document.createElement('textarea'); ta.value = url;
	    document.body.appendChild(ta); ta.select();
	    document.execCommand('copy'); document.body.removeChild(ta);
	    showToast('Link copied — send it to a friend');
	  }
	};

	function loadSharedResults(data) {
	  state.relation = data.rel; state.occasion = data.occ; state.budget = data.bud; state.interest = data.int||'dunno';
	  state.step = 4;
	  showView('resultsView');
	  renderResults();
	}



// ──────────────────────────────────
// Copy brand
// ──────────────────────────────────
function copyBrand(e,name){
  e.stopPropagation();
  var el=e.target;
  el.style.background='var(--green)';el.style.color='#fff';
  setTimeout(function(){el.style.background='';el.style.color='';},300);
  if(navigator.clipboard){
    navigator.clipboard.writeText(name).then(function(){showToast('Copied: '+name);});
  }else{
    var ta=document.createElement('textarea');ta.value=name;
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    showToast('Copied: '+name);
  }
}

// ──────────────────────────────────
// Favorites
// ──────────────────────────────────
function getGiftByIndex(k){
  var cards=document.querySelectorAll('.gift-card');
  var card=cards[k];if(!card)return null;
  var iconEl=card.querySelector('.gc-icon'),priceEl=card.querySelector('.gc-price');
  var whyEl=card.querySelector('.gc-why'),titleEl=card.querySelector('.gc-title');
  var brandsEls=card.querySelectorAll('.gc-brand');
  var brands=[];for(var b=0;b<brandsEls.length;b++)brands.push(brandsEls[b].textContent);
  return{
    i:iconEl?iconEl.textContent:'🎁',
    t:titleEl?titleEl.textContent.replace(iconEl?iconEl.textContent:'','').trim():'',
    p:priceEl?priceEl.textContent:'',w:whyEl?whyEl.textContent:'',
    b:brands.join('/'),
  };
}

function toggleFav(btn,k){
  var item=getGiftByIndex(k);if(!item||!item.t)return;
  var idx=-1;
  for(var i=0;i<savedGifts.length;i++){if(savedGifts[i].item.t===item.t){idx=i;break;}}
  if(idx>=0){
    savedGifts.splice(idx,1);btn.classList.remove('saved');btn.innerHTML='★ Save';
    showToast('Removed from saved');
  }else{
    savedGifts.unshift({relation:state.relation,occasion:state.occasion,budget:state.budget,item:item,date:new Date().toLocaleDateString('en-GB')});
    btn.classList.add('saved');btn.innerHTML='★ Saved';
    showToast('Saved ★');
  }
  document.getElementById('favCount').textContent=savedGifts.length;
}

function openFavs(){
  document.getElementById('drawerBackdrop').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderFavList();
}

function closeFavs(){
  document.getElementById('drawerBackdrop').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderFavList(){
  var c=document.getElementById('drawerList');
  if(savedGifts.length===0){
    c.innerHTML='<div class="drawer-empty"><div class="de-icon">★</div><h3>No saved gifts yet</h3><p style="font-size:13px;color:var(--sub);margin-top:4px">Tap ★ on any gift to save it here</p></div>';
    return;
  }
  var h='';
  for(var i=0;i<savedGifts.length;i++){
    var f=savedGifts[i],rl='';for(var x=0;x<PPL_LABELS.length;x++)if(PPL_LABELS[x].i===f.relation)rl=PPL_LABELS[x].l;
    h+='<div class="fav-item"><div class="fav-top"><div class="fav-name"><span>'+f.item.i+'</span>'+f.item.t+'</div><div class="fav-price">'+f.item.p+'</div></div><div class="fav-why">'+f.item.w+'</div><div class="fav-brands">'+f.item.b+'</div><div class="fav-meta"><span>For '+rl+'</span><span>'+f.date+'</span></div><button class="fav-remove" onclick="removeFav('+i+')">Remove</button></div>';
  }
  c.innerHTML=h;
}

function removeFav(idx){savedGifts.splice(idx,1);document.getElementById('favCount').textContent=savedGifts.length;renderFavList();showToast('Removed');}

// ──────────────────────────────────
// Utils
// ──────────────────────────────────
function resetAll(){
  state={step:0,relation:null,occasion:null,budget:null,interest:null,shown:[]};
  showView('stepperView');
  renderStep();
}
function showView(id){
  document.getElementById('stepperView').classList.remove('active');
  document.getElementById('resultsView').classList.remove('active');
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop=0;
}
function showToast(msg){
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2000);
}

// Init
(function(){
  var hash=location.hash;
  if(hash.indexOf('#share=')===0){
    try{
      var json=decodeURIComponent(hash.substring(7));
      var data=JSON.parse(json);
      loadSharedResults(data);
      return;
    }catch(e){}
  }
  renderStep();
})();
document.getElementById('favCount').textContent=savedGifts.length;
</script>
