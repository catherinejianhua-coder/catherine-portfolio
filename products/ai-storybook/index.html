<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Storybook Generator - Story Creation Studio</title>
<style>
:root {
  --bg: #fef9f3; --sidebar-bg: #faf5ee; --card-bg: #fffdf9; --input-bg: #fffbf6;
  --text: #4a3028; --text-muted: #8b6f64; --text-dim: #b8a094;
  --accent: #e8786a; --accent-soft: #f0976c;
  --accent-light: #fff0ec; --accent-dim: rgba(232,120,106,0.06);
  --border: rgba(139,111,100,0.10); --border-strong: rgba(139,111,100,0.18);
  --danger: #d9534f; --success: #6aaf6a;
  --font-body: Georgia,"Times New Roman",serif;
  --font-ui: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --radius: 10px; --radius-sm: 8px; --t: 200ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.8;-webkit-font-smoothing:antialiased}
body{display:flex;overflow:hidden}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-soft)}

.app-layout{display:flex;height:100vh;width:100%}

/* ── Left Sidebar ── */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;font-family:var(--font-ui)}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-header .logo-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#fff0e8,#ffe4d6);border:1px solid rgba(232,120,106,0.2);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-header .logo-text{font-size:13px;font-weight:600;color:var(--accent)}
.sidebar-new-btn{margin:8px 10px;padding:7px;border:1px dashed var(--border-strong);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--accent);cursor:pointer;font-size:11px;letter-spacing:0.03em;transition:all var(--t);text-align:center}
.sidebar-new-btn:hover{border-color:var(--accent-soft);background:var(--accent-light)}
.sidebar-stories{flex:1;overflow-y:auto;padding:2px 8px}
.sidebar-stories::-webkit-scrollbar{width:3px}
.sidebar-stories::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
.sidebar-story{position:relative;display:flex;align-items:center;gap:8px;padding:8px 30px 8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--t);margin-bottom:1px;font-size:12px;overflow:hidden}
.sidebar-story:hover{background:var(--accent-dim)}
.sidebar-story.active{background:var(--accent-light);border:1px solid rgba(232,120,106,0.25);border-left:3px solid var(--accent)}
.sidebar-story .ss-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ss-dot.done{background:var(--success)}.ss-dot.partial{background:var(--accent-soft)}.ss-dot.empty{background:var(--text-dim)}
.sidebar-story .ss-info{flex:1;min-width:0}
.sidebar-story .ss-name{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.sidebar-story .ss-time{font-size:9px;color:var(--text-dim);margin-top:1px}
.sidebar-story .ss-del{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:4px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1;opacity:0.38}
.sidebar-story:hover .ss-del,.sidebar-story:focus-within .ss-del{opacity:1}
.sidebar-story .ss-del:hover{background:rgba(217,83,79,0.08);color:var(--danger)}

/* ── Trash section in sidebar ── */
.library-trash-panel{border-bottom:1px solid var(--border);background:var(--card-bg);padding:8px 10px;max-height:180px;overflow-y:auto}
.library-trash-panel.hidden{display:none}
.trash-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:var(--radius-sm);font-size:11px;color:var(--text-dim);font-family:var(--font-ui);transition:all var(--t);margin-bottom:2px}
.trash-item:hover{background:rgba(217,83,79,0.04);color:var(--text-muted)}
.trash-item .trash-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trash-item .trash-age{font-size:9px;color:var(--text-dim);flex-shrink:0}
.trash-item .trash-restore{font-size:9px;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text-muted);cursor:pointer;transition:all var(--t);font-family:var(--font-ui)}
.trash-item .trash-restore:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.trash-item .trash-restore.perm-delete:hover{border-color:var(--danger);color:var(--danger);background:rgba(217,83,79,0.06)}

/* ── Confirm modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn 150ms ease}
.modal-box{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:20px 24px;max-width:340px;width:90%;font-family:var(--font-ui);font-size:13px}
.modal-box .modal-title{font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text)}
.modal-box .modal-body{color:var(--text-muted);margin-bottom:16px;line-height:1.8;font-size:12px}
.modal-box .modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-box .modal-actions .modal-btn{font-family:var(--font-ui);font-size:11px;padding:6px 14px;border:1px solid var(--border-strong);border-radius:3px;background:var(--card-bg);color:var(--text);cursor:pointer;transition:all var(--t)}
.modal-box .modal-actions .modal-btn:hover{border-color:var(--accent-soft);color:var(--accent)}
.modal-box .modal-actions .modal-btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
.modal-box .modal-actions .modal-btn.danger:hover{opacity:0.9}

/* ── Library danger button ── */
.lib-btn.danger{color:var(--danger);border-color:rgba(217,83,79,0.2)}
.lib-btn.danger:hover{background:rgba(217,83,79,0.04);border-color:var(--danger);color:var(--danger)}

/* ── Center Chat ── */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
.chat-header{padding:8px 16px;border-bottom:1px solid var(--border);background:var(--card-bg);font-family:var(--font-ui);font-size:12px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:40px}
.chat-header .story-title-header{color:var(--text);font-weight:500;flex:1}
.chat-header .empty-hint{color:var(--text-dim);font-weight:400}
.header-gen-btn{font-family:var(--font-ui);font-size:10px;padding:4px 12px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent-soft),var(--accent));color:#fff;cursor:pointer;transition:all var(--t);white-space:nowrap;box-shadow:0 1px 4px rgba(232,120,106,0.15)}
.header-gen-btn:hover{box-shadow:0 2px 8px rgba(232,120,106,0.25);transform:translateY(-1px)}
.header-gen-btn.regen{background:var(--card-bg);border:1px solid var(--border-strong);color:var(--text);box-shadow:none}
.header-gen-btn.regen:hover{border-color:var(--accent-soft);color:var(--accent);background:var(--accent-light);box-shadow:none}

.messages{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}

.msg{display:flex;flex-direction:column;max-width:85%;animation:fadeIn 250ms ease}
.msg.user{align-self:flex-end}.msg.assistant{align-self:flex-start}.msg.system{align-self:center;max-width:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user .bubble{background:var(--accent-soft);color:#fff;border-radius:var(--radius) var(--radius) 3px var(--radius);padding:9px 14px;font-size:14px;line-height:1.8}
.msg.assistant .bubble{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-size:14px;line-height:2.1}
.msg.system .bubble{color:var(--text-dim);font-family:var(--font-ui);font-size:10px;text-align:center;letter-spacing:0.04em;padding:3px 10px}
.msg .bubble h2{font-size:17px;font-weight:500;color:var(--accent);margin:10px 0 6px}
.msg .bubble h3{font-size:14px;font-weight:500;color:var(--text);margin:8px 0 4px}
.msg .bubble strong{color:var(--accent);font-weight:500}
.msg .bubble em{color:var(--text-muted)}
.msg .bubble p{margin:3px 0}
.msg .bubble ul,.msg .bubble ol{padding-left:18px;margin:5px 0}
.msg .bubble li{margin:2px 0;font-size:13px}
.msg .bubble code{background:var(--accent-dim);border:1px solid var(--border);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:.9em;color:var(--accent)}

.story-preview{margin-top:8px;background:var(--accent-light);border:1px solid rgba(232,120,106,0.15);border-radius:var(--radius);padding:14px 18px}
.story-preview .sp-title{font-size:18px;color:var(--accent);margin-bottom:2px}
.story-preview .sp-subtitle{font-size:12px;color:var(--text-muted);font-style:italic;margin-bottom:8px}
.story-preview .sp-golden{font-size:13px;color:var(--accent);padding:6px 12px;background:var(--card-bg);border-left:3px solid var(--accent-soft);border-radius:2px var(--radius-sm) var(--radius-sm) 2px;margin-bottom:10px}
.story-preview .sp-pages{display:flex;flex-direction:column;gap:4px}
.story-preview .sp-page{display:flex;gap:8px;padding:6px 10px;background:var(--card-bg);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px}
.story-preview .sp-page-num{font-family:var(--font-ui);font-size:10px;color:var(--text-dim);min-width:38px;flex-shrink:0;padding-top:2px}
.story-preview .sp-page-text{color:var(--text);line-height:1.8}
.story-preview .sp-chars{margin-top:8px;font-size:12px;color:var(--text-muted)}

.progress-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-top:6px}
.progress-card .prog-label{font-family:var(--font-ui);font-size:10px;color:var(--text-muted);letter-spacing:0.04em;margin-bottom:5px;display:flex;justify-content:space-between}
.progress-card .prog-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.progress-card .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent-soft),var(--accent));transition:width 400ms ease;border-radius:1px}
.progress-card .prog-log{margin-top:5px;font-family:monospace;font-size:10px;color:var(--text-dim);max-height:48px;overflow-y:auto}

.run-status{display:none;flex-shrink:0;border-bottom:1px solid var(--border);background:#fff9f1;padding:9px 16px;font-family:var(--font-ui);gap:10px;align-items:center}
.run-status.active{display:flex}
.run-status .rs-icon{width:26px;height:26px;border-radius:7px;background:var(--accent-light);border:1px solid rgba(232,120,106,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.run-status .rs-main{flex:1;min-width:0}
.run-status .rs-top{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--text);line-height:1.4;margin-bottom:5px}
.run-status .rs-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.run-status .rs-percent{color:var(--accent);font-variant-numeric:tabular-nums;flex-shrink:0}
.run-status .rs-track{height:4px;background:var(--border);border-radius:999px;overflow:hidden}
.run-status .rs-fill{height:100%;min-width:8px;background:linear-gradient(90deg,var(--accent-soft),var(--accent));border-radius:999px;transition:width 350ms ease}
.run-status .rs-msg{margin-top:4px;font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.run-status.waiting .rs-fill{position:relative;animation:waitPulse 1.4s ease-in-out infinite}
@keyframes waitPulse{0%,100%{opacity:.45}50%{opacity:1}}

.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.btn{font-family:var(--font-ui);font-size:11px;letter-spacing:0.03em;padding:7px 14px;border:1px solid var(--border-strong);background:var(--card-bg);color:var(--text);cursor:pointer;transition:all var(--t);border-radius:var(--radius-sm);white-space:nowrap}
.btn:hover{border-color:var(--accent-soft);color:var(--accent);background:var(--accent-light)}
.btn.primary{background:linear-gradient(135deg,var(--accent-soft),var(--accent));border:none;color:#fff;box-shadow:0 2px 6px rgba(232,120,106,0.2)}
.btn.primary:hover{box-shadow:0 3px 10px rgba(232,120,106,0.25);color:#fff}
.inspiration-row{align-items:flex-start}
.inspiration-row .inspiration-btn{white-space:normal;text-align:left;line-height:1.55;letter-spacing:0;max-width:100%}
.inspiration-row .refresh-inspirations{white-space:nowrap}
.inspiration-row .refresh-inspirations:disabled{opacity:.65;cursor:wait}

.preview-links{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.preview-link{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;transition:all var(--t);background:var(--card-bg)}
.preview-link:hover{border-color:var(--accent-soft);background:var(--accent-light);color:var(--text)}
.preview-link .pl-icon{font-size:14px;width:20px;text-align:center}
.preview-link .pl-label{flex:1}
.preview-link .pl-hint{color:var(--text-dim);font-family:var(--font-ui);font-size:10px}

.typing{display:flex;gap:3px;padding:10px 14px;align-items:center}
.typing .dot{width:5px;height:5px;background:var(--accent-soft);border-radius:50%;animation:typingB 1.2s ease-in-out infinite}
.typing .dot:nth-child(1){animation-delay:0s}.typing .dot:nth-child(2){animation-delay:0.15s}.typing .dot:nth-child(3){animation-delay:0.3s}
@keyframes typingB{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-5px);opacity:0.9}}

.error-msg{background:#fff5f5;border:1px solid rgba(217,83,79,0.2);border-radius:var(--radius-sm);padding:8px 12px;font-family:var(--font-ui);font-size:12px;color:var(--danger)}

.input-area{border-top:1px solid var(--border);background:var(--card-bg);flex-shrink:0;padding:12px 20px 16px}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--input-bg);border:1px solid var(--border-strong);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;padding:10px 14px;resize:none;border-radius:var(--radius);outline:none;transition:border-color var(--t);min-height:42px;max-height:120px;field-sizing:content}
.input-row textarea:focus{border-color:var(--accent-soft)}
.input-row textarea::placeholder{color:var(--text-dim)}
.send-btn{width:42px;height:42px;flex-shrink:0;border:none;background:linear-gradient(135deg,var(--accent-soft),var(--accent));color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all var(--t);border-radius:var(--radius-sm);box-shadow:0 2px 6px rgba(232,120,106,0.2)}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(232,120,106,0.25)}
.send-btn:disabled{background:var(--border-strong);box-shadow:none;cursor:not-allowed;transform:none}

/* ── Right Library ── */
.library{width:280px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;font-family:var(--font-ui);overflow:hidden}
.library-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.library-trash-btn{font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text-dim);cursor:pointer;font-family:var(--font-ui);transition:all var(--t)}
.library-trash-btn:hover{border-color:var(--danger);color:var(--danger);background:rgba(217,83,79,0.04)}
.lib-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.lib-search input{width:100%;padding:7px 12px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--input-bg);color:var(--text);font-family:var(--font-ui);font-size:11px;outline:none;transition:border-color var(--t)}
.lib-search input:focus{border-color:var(--accent-soft)}
.lib-search input::placeholder{color:var(--text-dim)}
.library-list{flex:1;overflow-y:auto;padding:8px 10px}
.library-list::-webkit-scrollbar{width:3px}
.library-list::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
.lib-story{margin-bottom:10px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.lib-story-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background var(--t)}
.lib-story-header:hover{background:var(--accent-dim)}
.lib-story-header .lib-title{font-size:13px;font-weight:500;color:var(--text)}
.lib-story-header .lib-badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:400}
.lib-story-body{padding:0 14px 12px;display:none}
.lib-story.open .lib-story-body{display:block}
.lib-story-body .lib-link{display:flex;align-items:center;gap:6px;padding:6px 0;font-size:12px;color:var(--text);transition:color var(--t)}
.lib-story-body .lib-link:hover{color:var(--accent)}
.lib-story-body .lib-link-icon{font-size:14px;width:20px;text-align:center}
.lib-story-body .lib-meta{font-size:10px;color:var(--text-dim);padding:2px 0 4px}
.lib-story-body .lib-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.lib-story-body .lib-btn{font-size:10px;padding:3px 8px;border:1px solid var(--border-strong);border-radius:4px;background:var(--card-bg);color:var(--text-muted);cursor:pointer;transition:all var(--t)}
.lib-story-body .lib-btn:hover{border-color:var(--accent-soft);color:var(--accent)}
.lib-story-body .lib-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.lib-empty{padding:20px;text-align:center;color:var(--text-dim);font-size:12px}
.modal-input{width:100%;margin-top:8px;padding:8px 10px;border:1px solid var(--border-strong);border-radius:4px;background:var(--input-bg);color:var(--text);font-family:var(--font-body);font-size:13px;outline:none}
.modal-input:focus{border-color:var(--accent-soft)}

@media(max-width:900px){.library{display:none}}
@media(max-width:700px){.sidebar{display:none}.messages{padding:14px 12px;gap:10px}.msg{max-width:94%}.input-area{padding:10px 12px 14px}}
</style>
</head>
<body>

<div class="app-layout">
  <!-- Left -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">📚</span>
      <span class="logo-text">Story Chats</span>
    </div>
    <button class="sidebar-new-btn" onclick="createNew()">+ New Story Chat</button>
    <nav class="sidebar-stories" id="sidebarStories"><div style="padding:8px 10px;color:var(--text-dim);font-size:11px">No chats yet</div></nav>
  </aside>

  <!-- Center -->
  <div class="main-area">
    <div class="chat-header" id="chatHeader"><span class="empty-hint">← Create or choose a chat</span></div>
    <!-- progress renders inline inside chat bubbles -->
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" placeholder="Type a message, Enter to send..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
          oninput="onInput()"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled>↑</button>
      </div>
    </div>
  </div>

  <!-- Right -->
  <aside class="library" id="library">
    <div class="library-header">
      <span>📖 Story Library</span>
      <button class="library-trash-btn" id="libraryTrashBtn" onclick="toggleTrash()">🗑 Trash</button>
    </div>
    <nav class="library-trash-panel hidden" id="sidebarTrash"></nav>
    <div class="lib-search"><input id="libSearch" placeholder="Search stories..." oninput="renderLibrary()"></div>
    <div class="library-list" id="libraryList"><div class="lib-empty">Generated stories will appear here</div></div>
  </aside>
</div>

<!-- Confirm modal -->
<div class="modal-overlay" id="confirmModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="confirmTitle">Confirm</div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">Cancel</button>
      <button class="modal-btn danger" id="confirmOk">Confirm</button>
    </div>
  </div>
</div>

<script>
const S = {
  activeStory: null, history: [],
  histories: {}, runs: {}, saveState: {},
  stories: [], trash: [], search: '',
};

let API_BASE = null;
const API_CANDIDATES = (() => {
  const params = new URLSearchParams(window.location.search);
  const queryApi = params.get('api') || '';
  const savedApi = localStorage.getItem('babyBookApiBase') || '';
  const current = /^https?:$/.test(window.location.protocol) ? window.location.origin : '';
  return [...new Set([queryApi, current, 'http://127.0.0.1:8768', 'http://localhost:8768', 'http://127.0.0.1:8769', 'http://localhost:8769', 'http://127.0.0.1:8771', 'http://localhost:8771', 'http://127.0.0.1:8772', 'http://localhost:8772', 'http://127.0.0.1:8780', 'http://localhost:8780', savedApi, 'http://127.0.0.1:8767', 'http://localhost:8767', 'http://127.0.0.1:8765', 'http://localhost:8765'].filter(Boolean))]
    .map(x => x.replace(/\/$/, ''));

async function resolveApiBase() {
  if (API_BASE !== null) return API_BASE;
  for (const base of API_CANDIDATES) {
    try {
      const r = await fetch(`${base}/api/stories`, {cache: 'no-store'});
      if (r.ok) { API_BASE = base; return API_BASE; }
    } catch(e) {}
  }
  API_BASE = API_CANDIDATES[0] || '';
  return API_BASE;
}
async function apiFetch(path, options = {}) {
  const base = await resolveApiBase();
  try {
    return await fetch(`${base}${path}`, options);
  } catch(e) {
    API_BASE = null;
    const retryBase = await resolveApiBase();
    if (retryBase !== base) return fetch(`${retryBase}${path}`, options);
    throw e;
  }
}
function apiBaseForLinks() {
  return API_BASE || API_CANDIDATES.find(x => /^https?:/.test(x)) || 'http://127.0.0.1:8768';
}
function previewHref(story, file) {
  return `${apiBaseForLinks()}/preview/${encodeURIComponent(story)}/${encodeURIComponent(file)}`;
}

function defaultProgress(message='Submitted. Waiting for the generator...'){
  return {stage:'Preparing',current:0,total:4,pct:6,message,logs:[],active:true};
}
function clampPct(n){return Math.max(0,Math.min(100,Math.round(Number(n)||0)));}
function cleanProgressMessage(msg){
  msg=String(msg||'').trim();
  if(!msg)return'';
  if(/^exec:/i.test(msg))return 'The background task has started.';
  return msg.replace(/^Phase\s+1/i,'Preparing image prompts')
    .replace(/^Phase\s+2/i,'Generating illustrations')
    .replace(/^Phase\s+3/i,'Building story pages');
}
function normalizeProgressPatch(run,d={}){
  const msg=cleanProgressMessage(d.message||d.content||d.data||'');
  let stage=d.stage||'Processing',current=Number(d.current||0),total=Number(d.total||0),pct=d.pct;
  const rawStage=String(stage||'');
  const prev=run.progress||{};
  const prevStage=prev.stage, prevPhase=prev.phase||1;
  if(d.phase){
    // Phase label: set stage name, hide fraction (page progress provides it)
    const ph=Number(d.phase)||0;
    const names={1:'Preparing image prompts',2:'Generating illustrations',3:'Building story pages'};
    stage=names[ph]||'Building story';
    current=0;total=0;
    pct=Math.max(12,Math.min(85,Math.round(ph/3*100)));
    d.phase=ph; // pass back to setRunProgress for saving
  }else if(rawStage==='auto_generate'&&total>0){
    // Page-level progress: keep phase-based stage name
    stage=(prevStage&&prevStage!=='Processing'&&prevStage!=='Preparing'&&prevStage!=='Building story')?prevStage:'Generating illustrations';
    // Combined pct across phases: P1=0-33%, P2=33-66%, P3=66-88%
    var basePct=(prevPhase-1)*33;
    var phasePct=Math.round(current/total*33);
    pct=Math.max(12,Math.min(88,basePct+phasePct));
  }else if(rawStage==='build'){
    stage='Building story pages';
    current=0;total=0;pct=pct??88;
  }else if(rawStage==='generate_images'){
    stage='Generating illustrations';
  }
  if(total>0&&pct==null)pct=Math.round(current/total*100);
  var patch={stage:stage,current:current,total:total,pct:clampPct(pct==null?8:pct),message:msg};
  if(d.phase)patch.phase=d.phase;
  return patch;
}
function progressHtml(p){
  if(!p)return'';
  const pct=clampPct(p.pct ?? (p.total>0?p.current/p.total*100:8));
  const count=p.total>0?` (${p.current||0}/${p.total})`:'';
  const logs=(p.logs||[]).slice(-4).map(x=>escH(x)).join('<br>');
  const msg=p.message?`<div class="prog-log">${escH(p.message)}${logs?`<br>${logs}`:''}</div>`:(logs?`<div class="prog-log">${logs}</div>`:'');
  return `<div class="progress-card"><div class="prog-label"><span>${escH(p.stage||'Processing')}${count}</span><span>${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>${msg}</div>`;
}
function runBubbleHtml(run){

  return parts.join('') || typingHtml();

function setRunProgress(run,d={}){

function addRunLog(run,line){

function moveStoryState(oldName,newName,run){

function queueConversationSave(story, history, immediate=false){
  if(!story||story==='__new__')return Promise.resolve();
  const snapshot=cloneHistory(history);
  if(snapshot.length===0)return Promise.resolve();
  const state=S.saveState[story]||(S.saveState[story]={timer:null,inFlight:false,pending:null,promise:null});
  state.pending=snapshot;
  if(state.timer){clearTimeout(state.timer);state.timer=null;}
  if(immediate)return flushConversationSave(story);
  state.timer=setTimeout(()=>flushConversationSave(story),900);
  return Promise.resolve();
}
async function flushConversationSave(story){
  const state=S.saveState[story];
  if(!state)return;
  if(state.timer){clearTimeout(state.timer);state.timer=null;}
  if(state.inFlight)return state.promise;
  const snapshot=state.pending;
  if(!snapshot||snapshot.length===0)return;
  state.pending=null;
  state.inFlight=true;
  state.promise=(async()=>{
    try{
      await apiFetch(`/api/stories/${encodeURIComponent(story)}/conversation`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({history:snapshot})
      });
    }catch(e){}finally{
      state.inFlight=false;state.promise=null;
      if(state.pending)await flushConversationSave(story);
    }
  })();
  return state.promise;
}
async function saveConversation(story=S.activeStory, history=null, options={}){
  if(!story||story==='__new__')return;
  const snapshot=cloneHistory(history||getHistory(story));
  if(snapshot.length===0)return;
  setHistory(story,snapshot);
  return queueConversationSave(story,snapshot,!!options.immediate);
}
function commitAssistant(run, immediate=false){
  const content=(run.assistantContent||'').trim();
  if(!content)return;
  const history=getHistory(run.story);
  if(run.assistantIndex==null||!history[run.assistantIndex]||history[run.assistantIndex].role!=='assistant'){
    history.push({role:'assistant',content});
    run.assistantIndex=history.length-1;
  }else{
    history[run.assistantIndex].content=content;
  }
  setHistory(run.story,history);
  queueConversationSave(run.story,history,immediate);
}

function formatTime(ts) {
  if (!ts) return '';
  try { const d=new Date(ts); const now=new Date(); const diff=now-d;
    if (diff<60000) return 'just now';
    if (diff<3600000) return `${Math.floor(diff/60000)} min ago`;
    if (diff<86400000) return `${Math.floor(diff/3600000)} hr ago`;
    if (diff<604800000) return `${Math.floor(diff/86400000)} days ago`;
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  } catch(e) { return ''; }
}

  return S.stories.find(s => s.name === name) || null;

  if (!story) return false;
  return (story.totalPages || 0) === 0
    && (story.hasImages || 0) === 0

}

async function deleteConversation(name) {
  // First refresh to make sure we have the latest state (handles rename race)
  await refreshAll();
  // If the story no longer exists in the refreshed list, it was already renamed/deleted
  if (!storyExists(name)) {
    if (S.activeStory===name) { S.activeStory='__new__'; S.history=[]; rememberActiveStory(); showWelcome(); updateChatHeader(); }
    return; // nothing to delete
  }
  const story = storyMeta(name);
  const isDraft = isEmptyDraftStory(story);
  try {
    const url = isDraft
      ? `/api/stories/${encodeURIComponent(name)}/draft`
      : `/api/stories/${encodeURIComponent(name)}/conversation`;
    const r = await apiFetch(url, {method: 'DELETE'});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
  } catch(e) {
    // If delete failed because story was renamed, refresh and retry
    if (e.message.includes('404') || e.message.includes('not found')) {
      await refreshAll();
      alert('This chat was just renamed. The list has been refreshed. Please try deleting again.');
      return;
    }
    alert('Delete failed: ' + e.message);
    return;
  }
  if (S.activeStory===name) {
    S.history=[];
    S.activeStory = '__new__';
    rememberActiveStory();
    showWelcome();
    updateChatHeader();
  }
  await refreshAll();
}

    const callback = _modalCallback;
    closeModal();
    if (callback) await callback();
  };
}
function closeModal() {
  document.getElementById('confirmModal').style.display = 'none';
  _modalCallback = null;
}
// Close modal on overlay click or Escape
document.addEventListener('click', e => { if (e.target.id === 'confirmModal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
async function selectStory(name, options={}) {
  if(!options.skipSave) await saveConversation(S.activeStory,getHistory(S.activeStory),{immediate:true});
  S.activeStory = name; S.history = getHistory(name);
  rememberActiveStory();
  updateChatHeader(); renderSidebar(); updateComposer(); updateRunStatus();
  document.getElementById('messages').innerHTML = '';
  await loadConversation(name);
  updateRunStatus();
}

function updateChatHeader() {
  const h = document.getElementById('chatHeader');
  if (!S.activeStory) { h.innerHTML = '<span class="empty-hint">← Create or choose a chat</span>'; updateRunStatus(); return; }
  const running = isStoryRunning(S.activeStory) ? ' · generating' : '';
  h.innerHTML = `<span class="story-title-header">📖 ${escH(storyDisplayName(S.activeStory))}${running}</span>`;
  updateRunStatus();
}

async function createNew(options={}) {
  if(!options.skipSave) await saveConversation(S.activeStory,getHistory(S.activeStory),{immediate:true});
  S.activeStory = '__new__'; S.history = [];
  rememberActiveStory();
  updateChatHeader(); renderSidebar();
  showWelcome();
  updateComposer();
  updateRunStatus();
  document.getElementById('msgInput').focus();
}

async function runStoryCommand(name, message) {
  if (!name || isStoryRunning(name)) return;
  if (S.activeStory !== name) await selectStory(name);
  const input=document.getElementById('msgInput');
  input.value=message;
  updateComposer();
  send();
}

// ═══ Library (with search) ═══
function renderLibrary() {
  const lib = document.getElementById('libraryList');
  const q = (document.getElementById('libSearch')?.value||'').trim().toLowerCase();
  rememberLibrarySearch();
  let stories = S.stories.filter(s => (s.htmlFiles||[]).length > 0);
  if (q) stories = stories.filter(s => s.title.toLowerCase().includes(q) || s.name.toLowerCase().includes(q));
  stories = [...stories].sort((a,b) => (b.updated_at||b.created_at||'').localeCompare(a.updated_at||a.created_at||''));

  if (stories.length===0) {
    lib.innerHTML = `<div class="lib-empty">${q?'No matching stories':'Generated stories will appear here'}</div>`;
    return;
  }

  const labelMap = {
    'index.html':['📱','Vertical · CN'],'index_en.html':['📱','Vertical · EN'],
    'land.html':['🖥','Landscape · CN'],'land_en.html':['🖥','Landscape · EN'],
    'immersive.html':['🎬','Immersive · CN'],'immersive_en.html':['🎬','Immersive · EN'],
  };

  lib.innerHTML = stories.map(s => {
    const files = s.htmlFiles||[];
    const time = formatTime(s.updated_at || s.created_at);
    return `<div class="lib-story${S.activeStory===s.name?' open':''}">
      <div class="lib-story-header" onclick="this.parentElement.classList.toggle('open')">
        <div style="min-width:0">
          <div class="lib-title">${escH(s.title)}</div>
          <div style="font-size:9px;color:var(--text-dim);margin-top:1px">${time} updated · ${s.totalPages} pages</div>
        </div>
        <span class="lib-badge" style="background:var(--success)20;color:var(--success)">${files.length} pages</span>
      </div>
      <div class="lib-story-body">
        <div class="lib-meta">${s.totalPages} pages · ${s.hasImages}/${s.totalPages} images · ${s.hasEnglish?'English · ':''}${s.hasImmersive>0?s.hasImmersive+' immersive':''}</div>
        ${files.sort().map(f => { const[ic,lb]=labelMap[f]||['📄',f]; return `<a class="lib-link" href="${previewHref(s.name,f)}" target="_blank"><span class="lib-link-icon">${ic}</span>${lb}<span style="color:var(--text-dim);font-size:10px;margin-left:auto">↗</span></a>`; }).join('')}
        <div class="lib-actions">
          <button class="lib-btn" onclick="selectStory('${escapeA(s.name)}')">💬 Chat</button>
          ${s.totalPages>0&&s.hasImages<s.totalPages?`<button class="lib-btn" onclick="event.stopPropagation();runStoryCommand('${escapeA(s.name)}','Generate images')">🖼 Add images</button>`:''}
          <button class="lib-btn" onclick="event.stopPropagation();renameLibraryStory('${escapeA(s.name)}','${escapeA(s.title||s.name)}')">✏️ Rename</button>
          <button class="lib-btn danger" onclick="event.stopPropagation();trashLibraryStory('${escapeA(s.name)}')">🗑 Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══ Conversation ═══
function renderConversation(story, history, restored, storyData) {
  if (S.activeStory !== story) return;
  const msgs=document.getElementById('messages'); msgs.innerHTML='';
  const clean=cloneHistory(history);
  // Load story data from JSON if not provided (for fallback preview rebuild)
  var fallbackStory = storyData;
  if (clean.length>0) {
    clean.forEach(function(h){
      if(h.role==='user'){addMsg('user',escH(h.content));return;}
      // Rebuild rich story preview from saved snapshot if available
      if(h.storySnapshot && h.storySnapshot.pages && h.storySnapshot.pages.length>0){
        addMsg('assistant',storyPreviewHtml(h.storySnapshot,false));
        return;
      }
      // Fallback: if message looks like story completion and we have story.json data, rebuild preview
      if(fallbackStory && fallbackStory.pages && fallbackStory.pages.length>0 && /complete picture-book draft/.test(h.content||'')){
        addMsg('assistant',storyPreviewHtml(fallbackStory,false));
        return;
      }
      addMsg('assistant',md(h.content));
    });
    if (restored) addMsg('system','<div class="bubble">- Conversation restored -</div>');
  } else {
    showWelcome();
  }
  attachRunToView(story);
  updateComposer();
}
function attachRunToView(story) {
  const run=S.runs[story];
  if(!run?.active||S.activeStory!==story)return;
  const history=getHistory(story);
  const assistantEls=Array.from(document.querySelectorAll('#messages .msg.assistant'));
  let msgEl=null;
  if(run.assistantIndex!=null&&history[run.assistantIndex]?.role==='assistant'){
    const assistantOrdinal=history.slice(0,run.assistantIndex+1).filter(h=>h.role==='assistant').length;
    msgEl=assistantEls[assistantOrdinal-1]||assistantEls[assistantEls.length-1]||null;
  }
  if(!msgEl)msgEl=addMsg('assistant',typingHtml());
  run.msgEl=msgEl;run.bubble=msgEl.querySelector('.bubble');run.renderBubble=run.bubble;run.progressCard=null;
  if(run.assistantContent.trim()||run.progress||run.extras?.length)renderRunBubble(run);
  updateRunStatus();
}
async function loadConversation(story=S.activeStory) {
  if (!story) return;
  if (story==='__new__') { showWelcome(); updateComposer(); return; }
  // Try loading story.json for fallback preview rebuild
  var storyData = null;
  try {
    var sr = await apiFetch('/api/stories/'+encodeURIComponent(story));
    if(sr.ok){var d=await sr.json();var s=d.story||d;if(s.pages&&s.pages.length)storyData=s;}
  }catch(e){}
  const cached=S.histories[story];
  if(cached&&cached.length){renderConversation(story,cached,true,storyData);return;}
  try {
    const r=await apiFetch('/api/stories/'+encodeURIComponent(story)+'/conversation');
    const d=await r.json();
    const history=cloneHistory(d.history||[]);
    setHistory(story,history);
    if (history.length>0) { renderConversation(story,history,true,storyData); return; }
  } catch(e){}
  if(S.activeStory===story)showWelcome();
  updateComposer();
}
function showWelcome() {
  const m=document.getElementById('messages');
  m.innerHTML=`<div class="msg assistant"><div class="bubble"><h2>✨ AI Storybook Generator</h2><p>Tell me what kind of bedtime story you want. We will shape it into a picture-book draft together.</p><div style="margin-top:12px"><div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">💡 Try one of these ideas:</div><div class="btn-row inspiration-row" id="inspirationList"></div></div></div>`;
  renderInspirations(DEFAULT_INSPIRATIONS);
  scrollBottom();
}
function renderInspirations(ideas, loading=false) {
  const box=document.getElementById('inspirationList');
  if(!box)return;
  if(ideas&&ideas.length)currentInspirations=ideas;
  const list=(currentInspirations&&currentInspirations.length?currentInspirations:DEFAULT_INSPIRATIONS).slice(0,6);
  const btns=list.map(i => {
    const text=inspirationText(i);
    const prompt=`I want to create a story about ${text}.`;
    return `<button class="btn inspiration-btn" type="button" data-quick="${escapeA(prompt)}">${escH(`${i.emoji||'✨'} ${text}`)}</button>`;
  }).join('');
  box.innerHTML=`${btns}<button class="btn refresh-inspirations" type="button" data-refresh-inspirations="1" ${loading?'disabled':''}>${loading?'Refreshing...':'Refresh ideas'}</button>`;
}
function inspirationText(item){
  const raw=String(item?.text||item?.display||item?.prompt||item?.title||'a warm little adventure').trim();
  return raw
    .replace(/^I want to create a story about /i, '')
    .replace(/[.!]$/, '')
    .trim() || 'a warm little adventure';
}
async function refreshInspirations(options={}) {
  const box=document.getElementById('inspirationList');
  if(!box)return;
  if(!options.silent)renderInspirations(null,true);
  try{
    const r=await apiFetch(`/api/inspirations?t=${Date.now()}`,{cache:'no-store'});
    const data=await r.json();
    renderInspirations(data.ideas||DEFAULT_INSPIRATIONS);
  }catch(e){
    renderInspirations(null);
  }
}

// ═══ Chat ═══
async function send() {
  if (!S.activeStory) { alert('Please create or choose a story first.'); return; }
  const input=document.getElementById('msgInput'); const msg=input.value.trim(); if(!msg)return;
  if (isStoryRunning(S.activeStory)) return;

  if (S.activeStory==='__new__') {
    const now=new Date(); const p=n=>String(n).padStart(2,'0');
    const baseName=`new-story-${now.getFullYear()}${p(now.getMonth()+1)}${p(now.getDate())}-${p(now.getHours())}${p(now.getMinutes())}${p(now.getSeconds())}-${String(now.getMilliseconds()).padStart(3,'0')}`;
    let tName=baseName, created=false;
    for(let i=0;i<3;i++){
      const candidate=i===0?baseName:`${baseName}-${i+1}`;
      try{
        const r=await apiFetch('/api/stories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:candidate})});
        if(r.ok){tName=candidate;created=true;break;}
      }catch(e){}
    }
    if(!created){
      created = true;
      tName = baseName;
      S.stories.unshift({
        name:tName,
        title:'New story',
        totalPages:0,
        hasImages:0,
        htmlFiles:[],
        hasConversation:true,
        created_at:new Date().toISOString(),
        updated_at:new Date().toISOString()
      });
    }
    S.activeStory = tName; setHistory(tName,[]);
    rememberActiveStory();
    await refreshAll(); updateChatHeader(); renderSidebar();
  }

  const story=S.activeStory;
  const prior=cloneHistory(getHistory(story));
  const history=prior.concat([{role:'user',content:msg}]);
  setHistory(story,history);
  input.value='';input.style.height='auto';updateComposer();
  addMsg('user',escH(msg));
  const msgEl=addMsg('assistant',typingHtml());
  const run={story,active:true,assistantContent:'',assistantIndex:null,msgEl,bubble:msgEl.querySelector('.bubble'),progressCard:null,progress:null,extras:[],renderRaf:null,renderBubble:null,richBubble:false};
  S.runs[story]=run;updateChatHeader();renderSidebar();
  renderRunBubble(run);updateRunStatus();
  await saveConversation(story,history,{immediate:true});

  try{
    const r=await apiFetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,history:prior,current_story:story})});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const rd=r.body.getReader();const dc=new TextDecoder();let b='';
    while(true){const{value,done}=await rd.read();if(done)break;b+=dc.decode(value,{stream:true});const lines=b.split('\n');b=lines.pop();
      for(const l of lines){if(l.startsWith('data: ')){try{handleSSE(JSON.parse(l.slice(6)),run);}catch(e){}}}
    }
    b+=dc.decode();
    if(b.trim().startsWith('data: ')){try{handleSSE(JSON.parse(b.trim().slice(6)),run);}catch(e){}}
  }catch(e){runLocalStoryFallback(run,msg);}
  run.active=false; run.progress=null;
  flushRender(run);commitAssistant(run,true);
  delete S.runs[run.story];
  if(S.activeStory===run.story){updateChatHeader();updateComposer();updateRunStatus();document.getElementById('msgInput').focus();}
  await saveConversation(run.story,getHistory(run.story),{immediate:true});
  await refreshAll();
}

function runLocalStoryFallback(run,msg){
  const story = buildLocalStory(msg);
  const record = S.stories.find(s => s.name === run.story);
  if(record){
    record.title = story.name;
    record.totalPages = story.pages.length;
    record.hasImages = 0;
    record.updated_at = new Date().toISOString();
  }
  handleSSE({type:'story_saved', data:{story}}, run);
}

function buildLocalStory(prompt){
  const title = deriveStoryTitle(prompt);
  const hero = title.replace(/^The /,'').split(' ')[0] || 'Little One';
  return {
    name: title,
    subtitle: 'A gentle bedtime picture-book draft',
    golden: 'Small courage grows when someone listens.',
    totalPages: 5,
    characters: [{name: hero}, {name:'Moonlight'}, {name:'A kind friend'}],
    pages: [
      {text:`${hero} had a tiny wish tucked inside their pocket. It was small, but it glowed whenever the evening became quiet.`},
      {text:`On the path ahead, ${hero} met Moonlight, who whispered, "You do not have to hurry. A brave step can still be a small step."`},
      {text:`A kind friend appeared beside the flowers and listened carefully. Together, they named the worry and made it feel less heavy.`},
      {text:`By the time the stars came out, ${hero} had tried one new thing and smiled at the place where fear used to sit.`},
      {text:`That night, ${hero} fell asleep knowing that tomorrow could be gentle, too, and that courage could come back again.`}
    ]
  };
}

function deriveStoryTitle(prompt){
  const text = String(prompt || '').toLowerCase();
  if(text.includes('star')) return 'The Little Star Finds Home';
  if(text.includes('rain')) return 'The Raindrop\'s Gentle Adventure';
  if(text.includes('kitten') || text.includes('cat')) return 'The Shy Kitten Says Hello';
  if(text.includes('bunny') || text.includes('rabbit')) return 'The Talking Carrot';
  if(text.includes('moon')) return 'Moonlight Helps Me Sleep';
  if(text.includes('butterfly') || text.includes('caterpillar')) return 'The Special Butterfly';
  return 'The Warm Little Adventure';
}

function handleSSE(e,run) {
  const bubble=run.bubble;
  switch(e.type){
    case'chat_token':run.assistantContent+=(e.token||'');scheduleRender(run);commitAssistant(run);break;
    case'chat_message':run.assistantContent+=(e.content||'');scheduleRender(run);commitAssistant(run);break;
    case'thinking':{const text=e.content||e.data||'';if(run.progress||isProductionThinking(text))setRunProgress(run,{stage:'Processing',message:text||'The generator is processing...'});break;}
    case'log':updateProgressLog(run,e.data||'');break;
    case'progress':updateProgress(run,e.data||e);break;
    case'result':break;
    case'story_list':{let h=md(run.assistantContent)+'<div class="btn-row">';(e.data||[]).forEach(s=>{h+=`<button class="btn" onclick="selectStory('${escapeA(s.name)}')">📖 ${escH(s.title)}</button>`;});h+='</div>';setBubble(bubble,h);break;}
    case'story_detail':{const d=e.data||e,f=d.status?.htmlFiles||[];let h=md(run.assistantContent);if(f.length>0){const lb={'index.html':'📱Vertical','land.html':'🖥Landscape','immersive.html':'🎬Immersive','index_en.html':'📱EN','land_en.html':'🖥EN','immersive_en.html':'🎬EN'};h+='<div class="btn-row">';f.sort().forEach(x=>{h+=`<a href="${previewHref(d.dir,x)}" target="_blank" class="btn">${lb[x]||x} ↗</a>`;});h+='</div>';}setBubble(bubble,h);break;}
    case'story_saved':{const d=e.data||e,story=d.story||{},pages=Array.isArray(story.pages)?story.pages:[],total=pages.length||story.totalPages||0,auto=!!d.auto_start;if(d.dir){moveStoryState(d.renamed_from||run.story,d.dir,run);updateChatHeader();refreshAll();}if(run.renderRaf){cancelAnimationFrame(run.renderRaf);run.renderRaf=null;}run.renderBubble=null;if(auto){run.richBubble=true;commitAssistant(run);break;}run.richBubble=true;run.assistantContent='I turned \"'+(story.name||'this story')+'\" into a complete picture-book draft with '+total+' story scenes. You can keep editing the words or visuals. When the content feels right, the generator can build the story pages.';var h=storyPreviewHtml(story);setBubble(bubble,h);// Save storySnapshot before commitAssistant so it persists to disk
var history=getHistory(run.story);
if(run.assistantIndex==null||!history[run.assistantIndex]||history[run.assistantIndex].role!=='assistant'){history.push({role:'assistant',content:run.assistantContent});run.assistantIndex=history.length-1;}
history[run.assistantIndex].storySnapshot={name:story.name,subtitle:story.subtitle,golden:story.golden,totalPages:story.totalPages,characters:story.characters,pages:pages.map(function(p){return{text:p.text||''};})};
commitAssistant(run,true);break;}
    case'production_started':{flushRender(run);updateProgress(run,{stage:'Building story',current:0,total:4,pct:6,message:'Preparing story pages...'});break;}
    case'production_complete':{refreshAll();updateProgress(run,{stage:'Complete',current:4,total:4,pct:100,message:'Story library refreshed. You can open the pages.'});break;}
    case'action_buttons':{const btns=e.buttons||e.data?.buttons||[];if(btns.length){let h='<div class="btn-row">';btns.forEach(b=>{const cls=b.primary?'btn primary':'btn';h+=`<button class="${cls}" type="button" data-quick="${escapeA(b.label)}">${escH(b.label)}</button>`;});h+='</div>';addRunExtra(run,'actions',h);}break;}
    case'preview_links':{const d=e.data||e,lb={'index.html':'📱Vertical · CN','index_en.html':'📱Vertical · EN','land.html':'🖥Landscape · CN','land_en.html':'🖥Landscape · EN','immersive.html':'🎬Immersive · CN','immersive_en.html':'🎬Immersive · EN'};let h='<div class="preview-links">';(d.files||[]).sort().forEach(f=>{h+=`<a class="preview-link" href="${previewHref(d.story,f)}" target="_blank"><span class="pl-icon">${(lb[f]||'📄').slice(0,2)}</span><span class="pl-label">${lb[f]||f}</span><span class="pl-hint">↗ Open</span></a>`;});h+='</div>';addRunExtra(run,'preview_links',h);break;}
    case'error':{const msg=e.message||(typeof e.data==='string'?e.data:e.data?.message)||'Unknown error';addRunExtra(run,`error-${Date.now()}`,`<div class="error-msg">⚠ ${escH(msg)}</div>`);if(!run.assistantContent.endsWith('\n'))run.assistantContent+='\n';run.assistantContent+=`\n⚠ ${msg}\n`;setRunProgress(run,{stage:'Issue found',pct:100,message:msg});commitAssistant(run,true);break;}
  }
  scrollBottom();
}

function addMsg(role,html){const d=document.createElement('div');d.className=`msg ${role}`;d.innerHTML=`<div class="bubble">${html}</div>`;document.getElementById('messages').appendChild(d);scrollBottom();return d;}
function setBubble(b,html){if(!b)return;const t=b.querySelector('.typing');if(t)t.remove();b.innerHTML=html;scrollBottom();}
function scheduleRender(run){if(run.richBubble)return;run.renderBubble=run.bubble;if(!run.renderRaf)run.renderRaf=requestAnimationFrame(()=>{run.renderRaf=null;renderRunBubble(run);});}
function flushRender(run){if(run.renderRaf){cancelAnimationFrame(run.renderRaf);run.renderRaf=null;}if(!run.richBubble)renderRunBubble(run);}
function updateProgress(run,d){setRunProgress(run,d);}
function updateProgressLog(run,l){addRunLog(run,l);}
function scrollBottom(){const m=document.getElementById('messages');requestAnimationFrame(()=>{m.scrollTop=m.scrollHeight});}
function sendQuick(t){document.getElementById('msgInput').value=t;updateComposer();send();}
function onInput(){const i=document.getElementById('msgInput');i.style.height='auto';i.style.height=Math.min(i.scrollHeight,120)+'px';updateComposer();}
function isProductionThinking(text){return /generate images|storybook|build html|build page|translate|immersive|prompt|refresh library|story production/i.test(String(text||''));}
function escH(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function escapeA(s){return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(t){if(!t)return'';let h=escH(t);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^[•\-] (.+)$/gm,'<li>$1</li>');h=h.replace(/\n\n/g,'</p><p>');h=h.replace(/\n/g,'<br>');h='<p>'+h+'</p>';h=h.replace(/<p><\/p>/g,'');return h;}
</script>
